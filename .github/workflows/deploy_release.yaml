name: 构建和发布版本

on:
  release:
    types: [released]  # 发布 Release 时触发（非 draft/prerelease）

permissions:
  contents: write  # 允许上传 Release assets

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 提取版本号并更新 POM
        run: |
          # 从 tag (v2.0.0) 提取版本号 (2.0.0)
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          VERSION="${RELEASE_TAG#v}"
          echo "Release Tag: $RELEASE_TAG"
          echo "Version: $VERSION"
          # 更新所有模块的 pom.xml 版本
          mvn versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: 设置 JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: 配置 GPG 签名
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}

      - name: 发布到 Maven 中央仓库
        run: mvn clean deploy -P release -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}

      - name: 上传构建产物到 Release
        run: |
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          echo "Looking for JAR files to upload..."
          JAR_FILES=$(find . -path "./*/target/*.jar" -not -name "*-sources.jar" -not -name "*-javadoc.jar" -not -name "original-*.jar")
          if [ -z "$JAR_FILES" ]; then
            echo "No JAR files found!"
            exit 1
          fi
          echo "$JAR_FILES" | while read jar; do
            if [ -n "$jar" ]; then
              echo "Uploading: $jar"
              gh release upload "$RELEASE_TAG" "$jar" --clobber
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
