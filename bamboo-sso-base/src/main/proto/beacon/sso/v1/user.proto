syntax = "proto3";

package beacon.sso.v1;

import "link/base.proto";

option go_package = "github.com/phalanx-labs/beacon-sso-sdk/client/api/beacon/sso/v1;pb";
option java_package = "com.frontleaves.phalanx.beacon.sso.sdk.grpc.v1";
option java_multiple_files = true;
option java_outer_classname = "UserProto";

// Role 角色信息
message Role {
  // 角色代码（如 SUPER_ADMIN、ADMIN、MERCHANT）
  string code = 1;
  // 角色名称
  string name = 2;
  // 角色描述
  optional string description = 3;
}

// User 用户信息
message User {
  // 用户 ID（雪花 ID 格式）
  string id = 1;
  // 用户名
  string username = 2;
  // 昵称
  string nickname = 3;
  // 邮箱地址
  optional string email = 4;
  // 手机号码
  optional string phone = 5;
  // 头像 URL
  optional string avatar = 6;
  // 性别（0 未知 / 1 男 / 2 女）
  int32 gender = 7;
  // 生日（ISO 8601 日期格式）
  optional string birthday = 8;
  // 状态（0 禁用 / 1 启用）
  int32 status = 9;
  // 邮箱是否已验证
  bool is_email_verified = 10;
  // 手机是否已验证
  bool is_phone_verified = 11;
  // 是否需要强制重置密码
  bool need_reset_password = 12;
  // 最后登录时间（ISO 8601 格式）
  optional string last_login_at = 13;
  // 最后登录 IP
  optional string last_login_ip = 14;
  // 用户角色列表
  repeated Role roles = 20;
}

// GetCurrentUserRequest 获取当前用户请求
message GetCurrentUserRequest {}

// GetCurrentUserResponse 获取当前用户响应
message GetCurrentUserResponse {
  // 基础响应信息
  xBase.BaseResponse base_response = 1;
  // 用户信息
  User user = 11;
}

// GetUserByIDRequest 根据 ID 获取用户请求
message GetUserByIDRequest {
  // 用户 ID（雪花 ID 格式，必填）
  string user_id = 1;
}

// GetUserByIDResponse 根据 ID 获取用户响应
message GetUserByIDResponse {
  // 基础响应信息
  xBase.BaseResponse base_response = 1;
  // 用户信息
  User user = 11;
}

// UserService 用户服务（需要 App 认证 + 用户 Token 认证）
//
// 该服务的所有方法都需要在 metadata 中提供有效的 App 凭证和用户 Token：
// - app-access-id: App 的 Access ID
// - app-secret-key: App 的 Secret Key
// - authorization: Bearer {token}
service UserService {
  // GetCurrentUser 获取当前登录用户的详细信息
  //
  // 该方法通过验证用户 Token 获取当前登录用户的完整信息，包括：
  // - 用户基础信息（ID、用户名、昵称等）
  // - 联系方式（邮箱、手机）
  // - 验证状态（邮箱/手机是否已验证）
  // - 安全状态（是否需要重置密码）
  // - 登录信息（最后登录时间/IP）
  // - 角色列表
  rpc GetCurrentUser(GetCurrentUserRequest) returns (GetCurrentUserResponse);

  // GetUserByID 根据用户 ID 获取用户详细信息
  //
  // 该方法允许已认证的 App 查询指定用户的完整信息。
  // 主要用于接入 App 需要获取其他用户信息的场景。
  //
  // 与 GetCurrentUser 的区别：
  // - GetCurrentUser: 从 Token 中获取当前登录用户信息
  // - GetUserByID: 通过 user_id 参数获取任意用户信息
  //
  // 适用场景：
  // - 查看其他用户资料
  // - 用户选择器组件
  // - 管理后台查询
  rpc GetUserByID(GetUserByIDRequest) returns (GetUserByIDResponse);
}
