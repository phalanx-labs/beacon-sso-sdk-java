syntax = "proto3";

package beacon.sso.v1;

import "link/base.proto";

option go_package = "github.com/phalanx-labs/beacon-sso-sdk/client/api/beacon/sso/v1;pb";
option java_package = "com.frontleaves.phalanx.beacon.sso.sdk.grpc.v1";
option java_multiple_files = true;
option java_outer_classname = "AuthProto";

// RegisterByEmailRequest 邮箱注册请求
message RegisterByEmailRequest {
  // 邮箱地址（必填）
  string email = 1;
  // 验证码（必填）
  string code = 2;
  // 用户名（可选，不填则自动生成）
  string username = 3;
  // 密码（必填，至少 6 位且包含字母和数字）
  string password = 4;
  // 昵称（可选，不填则使用用户名或自动生成）
  string nickname = 5;
}

// RegisterByEmailResponse 邮箱注册响应
message RegisterByEmailResponse {
  // 基础响应信息
  xBase.BaseResponse base_response = 1;
  // 用户 ID（雪花 ID 格式）
  string user_id = 11;
  // 登录 Token（可用于后续认证）
  string token = 12;
}

// PasswordLoginRequest 密码登录请求（Resource Owner Password Credentials Grant）
message PasswordLoginRequest {
  // 用户标识（用户名、邮箱或手机号）
  string username = 1;
  // 用户密码（明文）
  string password = 2;
  // 授权范围（必须包含 openid）
  string scope = 3;
  // 客户端 IP 地址（可选，用于安全审计）
  optional string client_ip = 4;
  // 客户端 User-Agent（可选，用于安全审计）
  optional string user_agent = 5;
}

// PasswordLoginResponse 密码登录响应
message PasswordLoginResponse {
  // 基础响应信息
  xBase.BaseResponse base_response = 1;
  // Access Token（UUID 格式）
  string access_token = 11;
  // Token 类型（固定为 "Bearer"）
  string token_type = 12;
  // Access Token 有效期（秒）
  int64 expires_in = 13;
  // Refresh Token（UUID 格式）
  optional string refresh_token = 14;
  // 授权范围
  optional string scope = 15;
  // ID Token（JWT 格式，scope 包含 openid 时返回）
  optional string id_token = 16;
}

// ChangePasswordRequest 修改密码请求
message ChangePasswordRequest {
  // 用户 ID（雪花 ID 格式）
  string user_id = 1;
  // 旧密码（强制重置模式下可省略）
  optional string old_password = 2;
  // 新密码（至少 6 位且包含字母和数字）
  string new_password = 3;
}

// ChangePasswordResponse 修改密码响应
message ChangePasswordResponse {
  // 基础响应信息
  xBase.BaseResponse base_response = 1;
}

// AuthService 认证服务（需要 App 认证）
//
// 该服务的所有方法都需要在 metadata 中提供有效的 App 凭证：
// - app-access-id: App 的 Access ID
// - app-secret-key: App 的 Secret Key
service AuthService {
  // RegisterByEmail 通过邮箱注册
  //
  // 该接口用于通过邮箱验证码完成用户注册，注册成功后自动生成登录 Token。
  // 注册流程：
  // 1. 验证邮箱验证码
  // 2. 检查邮箱是否已注册
  // 3. 验证密码强度
  // 4. 创建用户账号
  // 5. 绑定邮箱并标记为已验证
  // 6. 生成登录 Token
  rpc RegisterByEmail(RegisterByEmailRequest) returns (RegisterByEmailResponse);

  // PasswordLogin 密码登录（Resource Owner Password Credentials Grant）
  //
  // 该方法实现了 OAuth 2.0 Password Grant，允许受信任的第一方客户端
  // 直接使用用户名和密码换取 Token。
  //
  // 安全特性：
  // - 仅限第一方应用使用（App.FirstParty = enabled）
  // - 支持用户名/邮箱/手机号三种登录方式（自动识别）
  // - 复用现有的密码验证逻辑（BCrypt）
  // - 复用现有的账户锁定机制
  rpc PasswordLogin(PasswordLoginRequest) returns (PasswordLoginResponse);

  // ChangePassword 修改用户密码
  //
  // 该方法允许已认证的应用为用户修改密码。
  // 普通模式需要验证旧密码，强制重置模式可跳过旧密码验证。
  //
  // 模式说明：
  // - 普通模式（NeedResetPassword=false）：必须提供 old_password 进行验证
  // - 强制重置模式（NeedResetPassword=true）：可省略 old_password，直接设置新密码
  //
  // 安全特性：
  // - 旧密码验证使用 BCrypt
  // - 新密码必须满足强度要求（至少6位，包含字母和数字）
  // - 新密码不能与旧密码相同
  rpc ChangePassword(ChangePasswordRequest) returns (ChangePasswordResponse);
}
