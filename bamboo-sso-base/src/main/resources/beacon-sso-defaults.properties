# Beacon SSO SDK Default Configuration
# =====================================

# Enable SSO functionality (default: true)
beacon.sso.enabled=true

# Default OAuth endpoints configuration
beacon.sso.endpoints.authorization=/oauth2/authorize
beacon.sso.endpoints.token=/oauth2/token
beacon.sso.endpoints.userinfo=/oauth2/userinfo
beacon.sso.endpoints.introspection=/oauth2/introspect
beacon.sso.endpoints.jwks=/oauth2/jwks
beacon.sso.endpoints.end-session=/oauth2/logout

# Default gRPC configuration
beacon.sso.grpc.enabled=false
beacon.sso.grpc.port=9090
